<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventifyHub | Event Details</title>

    <link rel="stylesheet" href="../../assets/css/student_pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <div class="integrated-header">
        <div class="logo">EventifyHub</div>
        <nav>
            <a href="student-home.html">Home</a>
            <a href="my-registrations.html">Register</a>
            <a href="bookmarks.html">Bookmarks</a>
            <a href="profile.html">Profile</a>
        </nav>
        <a href="../student/login-signup.html" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</header>

<main>

    <!-- ===== EVENT OVERVIEW ===== -->
    <section class="top-section-container">
        <h1 id="event-title">Event Title</h1>
        <p class="slogan-text" id="event-society">
            Organized by Society Name
        </p>
    </section>

    <!-- ===== EVENT DETAILS CARD ===== -->
    <section class="my-events-section event-details-card">

        <div class="detail-row">
            <i class="fas fa-calendar-alt"></i>
            <span id="event-date">Date</span>
        </div>

        <div class="detail-row">
            <i class="fas fa-clock"></i>
            <span id="event-time">Time</span>
        </div>

        <div class="detail-row">
            <i class="fas fa-map-marker-alt"></i>
            <span id="event-venue">Venue</span>
        </div>

        <div class="detail-row">
            <i class="fas fa-users"></i>
            <span id="event-seats">Available Seats</span>
        </div>

        <hr>

        <p id="event-description">
            Event description will appear here.
        </p>

        <div class="event-actions">
            <button class="primary-btn" id="register-btn">
                <i class="fas fa-check-circle"></i> Register
            </button>

            <button class="secondary-btn" id="bookmark-btn">
                <i class="fas fa-bookmark"></i> Bookmark
            </button>
        </div>

    </section>

</main>

<script src="../../assets/js/student_event_details.js"></script>
<script src="../../assets/js/api.js"></script>
</body>
</html>
