<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventifyHub | Student Dashboard</title>

    <link rel="stylesheet" href="../../assets/css/student_home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <div class="integrated-header">
        <div class="logo">EventifyHub</div>
        <nav>
        <!--<a href="student_home.html" class="active-link">Home</a>
            
            <a href="bookmarks.html">Bookmarks</a>
            <a href="profile.html">Profile</a>-->
            
      
        
            <a href="student-home.html" class="active-link">Home</a>
             <a href="my-registrations.html">Register</a>
        
             <a href="bookmarks.html">Bookmarks</a>
            <a href="profile.html">Profile</a>
              </nav>
     
        <a href="../student/login-signup.html" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout    </a>
    </div>
</header>

<main>

    <!-- ===== TOP SECTION ===== -->
    <section class="top-section-container">
        <div class="dashboard-summary">
            <h1>Welcome, Student</h1>
            <p class="slogan-text">
                Browse upcoming events and participate in campus activities.
            </p>
        </div>
    </section>

    <!-- ===== EVENT STATS ===== -->
    <section class="action-cards-grid">

        <div class="action-card">
            <div class="card-header">
                <i class="fas fa-calendar-alt"></i>
                <h2>Upcoming Events</h2>
            </div>
            <p class="stat-number" id="total-events">0</p>
        </div>

        <div class="action-card">
            <div class="card-header">
                <i class="fas fa-bookmark"></i>
                <h2>Bookmarked</h2>
            </div>
            <p class="stat-number" id="total-bookmarks">0</p>
        </div>

        <div class="action-card">
            <div class="card-header">
                <i class="fas fa-check-circle"></i>
                <h2>Registered</h2>
            </div>
            <p class="stat-number" id="total-registrations">0</p>
        </div>

    </section>

    <!-- ===== EVENTS LIST ===== -->
    <section class="my-events-section">
        <div class="my-events-header">
            <h3>Available Events</h3>
        </div>

        <div id="events-list" class="event-list-container">
            <p class="placeholder-text">Events will load here.</p>
        </div>
    </section>

</main>

<script src="../../assets/js/student_home.js"></script>
<script src="../../assets/js/api.js"></script>
</body>
</html>
