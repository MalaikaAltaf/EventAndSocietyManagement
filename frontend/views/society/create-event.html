<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | EventifyHub</title>

    
    <link rel="stylesheet" href="../../assets/css/create-event.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<header class="integrated-header">
    <div class="logo">EventifyHub</div>
    <nav>
        <a href="society-dashboard.html">Dashboard</a>
        <a href="create-event.html" class="active">Create Event</a>
        <a href="participants-checkin.html">Participants</a>
    </nav>
    <a href="../student/login-signup.html" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</header>

<main>

    <div class="page-title">
        <h2>Submit Your Event Proposal</h2>
        <p>Fill in the details below to submit your event for approval.</p>
    </div>

    <form id="create-event-form" class="event-form">

        <div id="form-status-message" class="status-message" style="display: none;"></div>

        <div class="form-group">
            <label for="eventTitle">Event Title</label>
            <input type="text" id="eventTitle" placeholder="Enter event name (e.g., Annual Tech Summit)" required>
        </div>

        <div class="form-group">
            <label for="eventDescription">Event Description</label>
            <textarea id="eventDescription" rows="5" placeholder="Describe the purpose, agenda, and target audience for your event" required></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="eventDate">Date</label>
                <input type="date" id="eventDate" required>
            </div>

            <div class="form-group">
                <label for="eventTime">Time</label>
                <input type="time" id="eventTime" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="eventLocation">Location</label>
                <input type="text" id="eventLocation" placeholder="Venue or Hall" required>
            </div>

            <div class="form-group">
                <label for="maxParticipants">Max Participants</label>
                <input type="number" id="maxParticipants" min="1" placeholder="Max attendees capacity" required>
            </div>
        </div>

        <div class="form-group">
            <label for="eventSociety">Society</label>
            <select id="eventSociety" required>
                <option value="">Select society</option>
                <!-- Societies will be populated by JavaScript -->
            </select>
        </div>

        <div class="form-group">
            <label for="eventCategory">Event Category</label>
            <select id="eventCategory" required>
                <option value="">Select category</option>
                <option>Workshop</option>
                <option>Seminar</option>
                <option>Competition</option>
                <option>Social</option>
                <option>Cultural</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">Submit Event for Approval</button>

    </form>

</main>



<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/society.js"></script>
<script src="../../assets/js/create-event.js"></script>

</body>
</html>
